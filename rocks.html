<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB Platform — Rocks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gb-red: #C8102E;
    --gb-red-soft: #FCE8EC;
    --gb-dark: #1A1A1A;
    --text: #2D2D2D;
    --text-soft: #6B6B6B;
    --text-faint: #9B9B9B;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #ECECE8;
    --accent: #D4A857;
    --green: #4A8F5E;
    --amber: #D97706;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.10);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

  /* === SIDEBAR === */
  .sidebar {
    background: #FFFFFF;
    border-right: 1px solid var(--border);
    padding: 28px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px 32px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark img { width: 100%; height: 100%; display: block; object-fit: contain; }
  .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .logo-text span { color: var(--text-faint); font-weight: 400; }

  .nav-section {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint); padding: 16px 12px 8px; font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px;
    color: var(--text-soft); cursor: pointer;
    font-size: 14px; font-weight: 500; transition: all 0.15s;
  }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--gb-red-soft); color: var(--gb-red); font-weight: 600; }
  .nav-item .icon { font-size: 16px; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .nav-item .icon svg { width: 18px; height: 18px; }

  /* === MAIN === */
  .main { padding: 40px 56px 80px; max-width: 1280px; }

  .breadcrumb { font-size: 13px; color: var(--text-faint); margin-bottom: 12px; }
  .breadcrumb span { color: var(--text); font-weight: 500; }

  .page-header { margin-bottom: 24px; }
  .page-title {
    font-size: 32px; font-weight: 700; letter-spacing: -0.8px;
    color: var(--gb-dark); margin-bottom: 6px;
  }
  .page-subtitle { font-size: 15px; color: var(--text-soft); max-width: 700px; }

  /* === FILTERS / TOOLBAR === */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin: 32px 0 20px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .quarter-tabs {
    display: flex; gap: 4px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .quarter-tab {
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .quarter-tab:hover { color: var(--text); }
  .quarter-tab.active {
    background: var(--gb-dark);
    color: white;
  }
  .quarter-tab .count {
    margin-left: 6px;
    font-size: 11px;
    opacity: 0.7;
    font-weight: 500;
  }

  .toolbar-right { display: flex; gap: 12px; align-items: center; }

  .filter-select {
    background: white;
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    outline: none;
    font-family: inherit;
  }

  .add-rock-btn {
    background: var(--gb-red);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .add-rock-btn:hover { background: #A50D26; }

  /* === SUMMARY STRIP === */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .summary-label {
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .summary-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--gb-dark);
  }
  .summary-value .total {
    font-size: 16px;
    color: var(--text-faint);
    font-weight: 500;
  }
  .summary-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 10px;
  }
  .summary-bar-fill { height: 100%; border-radius: 2px; }

  /* === ROCKS GRID === */
  .rocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  .rock-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .rock-card:hover {
    border-color: var(--text-soft);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .rock-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-pill.on-track { background: #E8F4EC; color: var(--green); }
  .status-pill.on-track .dot { background: var(--green); }
  .status-pill.at-risk { background: #FEF3E2; color: var(--amber); }
  .status-pill.at-risk .dot { background: var(--amber); }
  .status-pill.off-track { background: var(--gb-red-soft); color: var(--gb-red); }
  .status-pill.off-track .dot { background: var(--gb-red); }
  .status-pill.done { background: #EEF1F4; color: var(--text-soft); }
  .status-pill.done .dot { background: var(--text-soft); }

  .rock-quarter {
    font-size: 11px;
    color: var(--text-faint);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .rock-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--gb-dark);
    line-height: 1.4;
    letter-spacing: -0.2px;
  }

  .linked-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-soft);
    align-self: flex-start;
  }
  .linked-tag .icon { font-size: 10px; color: var(--gb-red); }
  .linked-tag .label { font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }

  .rock-progress-section { margin-top: auto; }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.3s;
    background: var(--gb-red);
  }
  .progress-bar-fill.on-track { background: var(--green); }
  .progress-bar-fill.at-risk { background: var(--amber); }
  .progress-bar-fill.off-track { background: var(--gb-red); }
  .progress-bar-fill.done { background: var(--text-soft); }

  .rock-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-soft);
  }
  .owner-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--gb-dark);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .avatar.col-1 { background: #2C5282; }
  .avatar.col-2 { background: #C8102E; }
  .avatar.col-3 { background: #4A8F5E; }
  .avatar.col-4 { background: #D4A857; }
  .avatar.col-5 { background: #6B46C1; }

  .milestones-count {
    font-weight: 500;
    color: var(--text-soft);
  }

  .delete-card {
    position: absolute; top: 10px; right: 10px;
    background: transparent; border: none;
    width: 24px; height: 24px; border-radius: 6px;
    cursor: pointer; color: var(--text-faint); font-size: 14px;
    opacity: 0; transition: opacity 0.15s;
  }
  .rock-card:hover .delete-card { opacity: 1; }
  .delete-card:hover { background: var(--gb-red-soft); color: var(--gb-red); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    background: white;
    border: 1px dashed var(--border);
    border-radius: 14px;
    color: var(--text-soft);
  }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
  .empty-state p { font-size: 14px; max-width: 380px; margin: 0 auto 18px; }

  /* === DRAWER === */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s; z-index: 50;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed; top: 0; right: 0;
    width: 580px; max-width: 92vw; height: 100vh;
    background: white; box-shadow: var(--shadow-lg);
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 51; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 22px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-tag {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-faint); font-weight: 600;
  }
  .drawer-actions { display: flex; gap: 6px; }
  .drawer-btn {
    background: transparent; border: none;
    width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; font-size: 16px; color: var(--text-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .drawer-btn:hover { background: var(--bg); }
  .drawer-btn.danger:hover { background: var(--gb-red-soft); color: var(--gb-red); }

  .drawer-body { padding: 28px 32px; overflow-y: auto; flex: 1; }

  [contenteditable="true"] {
    outline: none; border-radius: 6px;
    padding: 4px 8px; margin: -4px -8px;
    transition: all 0.15s; cursor: text;
  }
  [contenteditable="true"]:hover {
    background: var(--bg);
    box-shadow: inset 0 0 0 1px var(--border);
  }
  [contenteditable="true"]:focus {
    background: white;
    box-shadow: inset 0 0 0 2px var(--gb-red);
  }
  [contenteditable="true"]:empty::before {
    content: attr(data-placeholder);
    color: var(--text-faint);
  }

  .drawer-title {
    font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
    color: var(--gb-dark); margin-bottom: 18px;
  }

  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px;
    margin-bottom: 24px;
  }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field.full { grid-column: 1 / -1; }
  .field-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-faint); font-weight: 600;
  }
  .field-input {
    font-size: 13px; color: var(--text); font-weight: 500;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    outline: none;
    cursor: text;
    transition: all 0.15s;
  }
  .field-input:hover { border-color: var(--text-soft); }
  .field-input:focus {
    background: white;
    border-color: var(--gb-red);
    box-shadow: 0 0 0 3px var(--gb-red-soft);
  }
  select.field-input { cursor: pointer; }

  .drawer-section { margin-bottom: 26px; }
  .drawer-section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .drawer-section-title {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-faint); font-weight: 600;
  }
  .add-btn {
    background: transparent; border: 1px dashed var(--border);
    color: var(--text-soft); padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .add-btn:hover { color: var(--gb-red); border-color: var(--gb-red); }

  .description-area {
    font-size: 14px; line-height: 1.6; color: var(--text);
    min-height: 60px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 0;
  }

  .milestone-list { display: flex; flex-direction: column; gap: 8px; }
  .milestone-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; background: var(--bg);
    border-radius: 8px; font-size: 14px;
  }
  .milestone-item .delete-ms {
    background: transparent; border: none;
    width: 22px; height: 22px; border-radius: 4px;
    cursor: pointer; color: var(--text-faint); font-size: 12px;
    opacity: 0; flex-shrink: 0;
  }
  .milestone-item:hover .delete-ms { opacity: 1; }
  .delete-ms:hover { background: var(--gb-red-soft); color: var(--gb-red); }

  .check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: white; cursor: pointer;
    background: white; transition: all 0.15s;
  }
  .check:hover { border-color: var(--green); }
  .check.done { background: var(--green); border-color: var(--green); }
  .milestone-text { flex: 1; }
  .milestone-item.done .milestone-text {
    color: var(--text-faint); text-decoration: line-through;
  }

  .save-indicator {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--gb-dark); color: white;
    padding: 10px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transform: translateY(10px);
    transition: all 0.3s; z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  .save-indicator.show { opacity: 1; transform: translateY(0); }

  .vision-link-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 6px;
  }
  .vision-link-preview strong {
    color: var(--text);
    font-weight: 600;
  }
  .vision-link-preview .ribbon {
    display: inline-block;
    font-size: 10px;
    background: var(--gb-red);
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark"><img src="gracie-barra-logo.png.png" alt="Gracie Barra"></div>
      <div class="logo-text">Management <span>OS</span></div>
    </div>

    <div class="nav-section">School</div>
    <div class="nav-item" onclick="location.href='dashboard.html'"><span class="icon">◐</span> Dashboard</div>
    <div class="nav-item" onclick="location.href='vision.html'"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/><path d="M6 11V7m12 4V7M8 7h8"/><path d="M10 15h4"/></svg></span> Vision</div>
    <div class="nav-item active"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg></span> Rocks</div>
    <div class="nav-item" onclick="location.href='metrics.html'"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 14a10 10 0 0 1 20 0"/><path d="M12 14l5-3"/><circle cx="12" cy="14" r="1.5" fill="currentColor"/></svg></span> Metrics</div>
    <div class="nav-item" onclick="location.href='todos.html'"><span class="icon">◯</span> To-Dos</div>
    <div class="nav-item" onclick="location.href='issues.html'"><span class="icon">!</span> Issues</div>

    <div class="nav-section">Knowledge</div>
    <div class="nav-item" onclick="location.href='sops.html'"><span class="icon">▤</span> SOPs Hub</div>
    <div class="nav-item" onclick="location.href='swot.html'"><span class="icon">▥</span> SWOT Analysis</div>

    <div class="nav-section">Rhythm</div>
    <div class="nav-item" onclick="location.href='meetings.html'"><span class="icon">▶</span> Meetings</div>
    <div class="nav-item"><span class="icon">★</span> Headlines</div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="breadcrumb">School <span>›</span> <span>Rocks</span></div>

    <div class="page-header">
      <h1 class="page-title">Quarterly Rocks</h1>
      <p class="page-subtitle">Your 90-day priorities. Each rock should ladder up to a 1-year goal or a 3–5 year milestone from your Vision.</p>
    </div>

    <div class="summary" id="summary"></div>

    <div class="toolbar">
      <div class="quarter-tabs" id="quarterTabs"></div>
      <div class="toolbar-right">
        <select class="filter-select" id="ownerFilter" onchange="renderRocks()">
          <option value="">All owners</option>
        </select>
        <select class="filter-select" id="statusFilter" onchange="renderRocks()">
          <option value="">All statuses</option>
          <option value="on-track">On track</option>
          <option value="at-risk">At risk</option>
          <option value="off-track">Off track</option>
          <option value="done">Done</option>
        </select>
        <button class="add-rock-btn" onclick="addRock()">+ Add Rock</button>
      </div>
    </div>

    <div class="rocks-grid" id="rocksGrid"></div>
  </main>
</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-tag" id="drawerTag">Rock</div>
    <div class="drawer-actions">
      <button class="drawer-btn danger" id="drawerDelete" title="Delete">🗑</button>
      <button class="drawer-btn" onclick="closeDrawer()" title="Close">✕</button>
    </div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<div class="save-indicator" id="saveIndicator">✓ Saved</div>

<script>
  // === DEFAULT DATA ===
  const DEFAULT_ROCKS = {

        ]
      },
      {
        id: "r3", quarter: "Q2", year: 2026,
        title: "Document mat & class SOPs (8 of 10)",
        owner: "Sebastien G.", ownerColor: 2,
        status: "at-risk", progress: 50,
        description: "Document the 10 core mat & class operating procedures: warm-ups, drilling structure, technique selection, gradings, injury protocol, etc.",
        linkedTo: { type: "goal", id: "g4" },
        milestones: [
          { text: "Outline all 10 SOPs", done: true },
          { text: "Write first 5 drafts", done: true },
          { text: "Review with assistant coaches", done: false },
          { text: "Publish final versions", done: false }
        ]
      },
      {
        id: "r4", quarter: "Q2", year: 2026,
        title: "Restructure Proshop margins and pricing",
        owner: "Maria L.", ownerColor: 3,
        status: "at-risk", progress: 35,
        description: "Review supplier costs, repricing strategy and bundle deals to raise Proshop monthly revenue from current 12% to 18% of total revenue.",
        linkedTo: { type: "goal", id: "g3" },
        milestones: [
          { text: "Audit current supplier costs", done: true },
          { text: "Benchmark competitor pricing", done: true },
          { text: "Redesign pricing structure", done: false },
          { text: "Launch new prices + bundles", done: false }
        ]
      },
      {
        id: "r5", quarter: "Q2", year: 2026,
        title: "Run brown belt promotion review",
        owner: "Sebastien G.", ownerColor: 2,
        status: "on-track", progress: 55,
        description: "Formal review of the 5 brown belts in the pipeline. Identify the 3 closest to black belt promotion and build their final-year development plan.",
        linkedTo: { type: "milestone", id: "m3" },
        milestones: [
          { text: "Individual assessments (5 athletes)", done: true },
          { text: "Map their gaps to BB standard", done: true },
          { text: "Build 12-month development plan", done: false },
          { text: "1:1 meeting with each athlete", done: false }
        ]
      },
      {
        id: "r6", quarter: "Q2", year: 2026,
        title: "Build trial-to-paying conversion funnel",
        owner: "Maria L.", ownerColor: 3,
        status: "on-track", progress: 65,
        description: "Define and implement a 7-day trial process with structured touchpoints. Target: lift conversion from 62% to 75%.",
        linkedTo: { type: "goal", id: "g1" },
        milestones: [
          { text: "Map current funnel + drop-offs", done: true },
          { text: "Design 7-day touchpoint sequence", done: true },
          { text: "Train front desk team", done: false },
          { text: "Launch + measure 30 days", done: false }
        ]
      },
      {
        id: "r7", quarter: "Q1", year: 2026,
        title: "Set up weekly L10 meeting structure",
        owner: "Sebastien G.", ownerColor: 2,
        status: "done", progress: 100,
        description: "Implement weekly leadership team meeting with scorecard review, rock check-in, headlines, to-dos and issues list.",
        linkedTo: null,
        milestones: [
          { text: "Define meeting agenda", done: true },
          { text: "Train team on the rhythm", done: true },
          { text: "Run for 4 consecutive weeks", done: true }
        ]
      },
      {
        id: "r8", quarter: "Q3", year: 2026,
        title: "Launch parent communication system",
        owner: "Maria L.", ownerColor: 3,
        status: "on-track", progress: 10,
        description: "Build a structured monthly parent communication: progress reports, attendance summary, upcoming events. Target: every kids parent receives a personalized monthly update.",
        linkedTo: { type: "milestone", id: "m4" },
        milestones: [
          { text: "Define content template", done: false },
          { text: "Build distribution list", done: false },
          { text: "Send first monthly batch", done: false }
        ]
      }
    ]
  };

  const STORAGE_KEY = "gb_rocks_data_v1";
  const VISION_KEY = "gb_vision_data_v1";

  let data = loadData();
  let visionData = loadVision();
  let currentEdit = null;
  let activeQuarter = data.currentQuarter || "Q2-2026";

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return JSON.parse(JSON.stringify(DEFAULT_ROCKS));
  }

  function loadVision() {
    try {
      const raw = localStorage.getItem(VISION_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return null;
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showSaved();
  }

  function showSaved() {
    const el = document.getElementById('saveIndicator');
    el.classList.add('show');
    clearTimeout(showSaved._t);
    showSaved._t = setTimeout(() => el.classList.remove('show'), 1500);
  }

  // === HELPERS ===
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function initialsOf(name) {
    return name.split(/\s+/).map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  function getLinkedVisionItem(link) {
    if (!link || !visionData) return null;
    if (link.type === 'milestone') return visionData.milestones?.find(m => m.id === link.id);
    if (link.type === 'goal') return visionData.goals?.find(g => g.id === link.id);
    return null;
  }

  function getLinkLabel(link) {
    const item = getLinkedVisionItem(link);
    if (!item) return null;
    const labelType = link.type === 'milestone' ? '3-5 YR' : '1 YR';
    return { type: labelType, title: item.title, year: item.year };
  }

  function getRocksForQuarter(qStr) {
    const [q, y] = qStr.split('-');
    return data.rocks.filter(r => r.quarter === q && String(r.year) === y);
  }

  function getAllOwners() {
    return [...new Set(data.rocks.map(r => r.owner))];
  }

  // === RENDER ===
  function renderQuarterTabs() {
    const tabs = document.getElementById('quarterTabs');
    const quarters = ['Q1-2026', 'Q2-2026', 'Q3-2026', 'Q4-2026'];
    tabs.innerHTML = quarters.map(q => {
      const count = getRocksForQuarter(q).length;
      return `<button class="quarter-tab ${activeQuarter === q ? 'active' : ''}" onclick="switchQuarter('${q}')">${q.replace('-', ' ')}<span class="count">${count}</span></button>`;
    }).join('');
  }

  function switchQuarter(q) {
    activeQuarter = q;
    renderAll();
  }

  function renderSummary() {
    const rocks = getRocksForQuarter(activeQuarter);
    const onTrack = rocks.filter(r => r.status === 'on-track').length;
    const atRisk = rocks.filter(r => r.status === 'at-risk').length;
    const offTrack = rocks.filter(r => r.status === 'off-track').length;
    const done = rocks.filter(r => r.status === 'done').length;
    const total = rocks.length || 1;

    document.getElementById('summary').innerHTML = `
      <div class="summary-card">
        <div class="summary-label">On Track</div>
        <div class="summary-value">${onTrack} <span class="total">/ ${rocks.length}</span></div>
        <div class="summary-bar"><div class="summary-bar-fill" style="width: ${onTrack/total*100}%; background: var(--green);"></div></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">At Risk</div>
        <div class="summary-value">${atRisk} <span class="total">/ ${rocks.length}</span></div>
        <div class="summary-bar"><div class="summary-bar-fill" style="width: ${atRisk/total*100}%; background: var(--amber);"></div></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Off Track</div>
        <div class="summary-value">${offTrack} <span class="total">/ ${rocks.length}</span></div>
        <div class="summary-bar"><div class="summary-bar-fill" style="width: ${offTrack/total*100}%; background: var(--gb-red);"></div></div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Done</div>
        <div class="summary-value">${done} <span class="total">/ ${rocks.length}</span></div>
        <div class="summary-bar"><div class="summary-bar-fill" style="width: ${done/total*100}%; background: var(--text-soft);"></div></div>
      </div>
    `;
  }

  function renderOwnerFilter() {
    const sel = document.getElementById('ownerFilter');
    const owners = getAllOwners();
    const current = sel.value;
    sel.innerHTML = '<option value="">All owners</option>' + owners.map(o => `<option value="${escapeHtml(o)}" ${o === current ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('');
  }

  function renderRocks() {
    const ownerFilter = document.getElementById('ownerFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;
    let rocks = getRocksForQuarter(activeQuarter);
    if (ownerFilter) rocks = rocks.filter(r => r.owner === ownerFilter);
    if (statusFilter) rocks = rocks.filter(r => r.status === statusFilter);

    const grid = document.getElementById('rocksGrid');
    if (rocks.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <h3>No rocks for this view</h3>
          <p>Either no rocks exist for ${activeQuarter.replace('-', ' ')} or your filters are too narrow. Add one to get started.</p>
          <button class="add-rock-btn" onclick="addRock()">+ Add Rock</button>
        </div>
      `;
      return;
    }

    grid.innerHTML = rocks.map(r => renderRockCard(r)).join('');
  }

  function renderRockCard(rock) {
    const linkLabel = getLinkLabel(rock.linkedTo);
    const statusText = {
      'on-track': 'On Track',
      'at-risk': 'At Risk',
      'off-track': 'Off Track',
      'done': 'Done'
    }[rock.status];
    const doneCount = rock.milestones.filter(m => m.done).length;

    return `
      <div class="rock-card" onclick="openRock('${rock.id}')">
        <button class="delete-card" onclick="event.stopPropagation(); deleteRock('${rock.id}')">✕</button>
        <div class="rock-top">
          <div class="status-pill ${rock.status}"><span class="dot"></span>${statusText}</div>
          <div class="rock-quarter">${rock.quarter} · ${rock.year}</div>
        </div>
        <div class="rock-title">${escapeHtml(rock.title)}</div>
        ${linkLabel ? `
          <div class="linked-tag" title="Linked to: ${escapeHtml(linkLabel.title)}">
            <span class="label">↪ ${linkLabel.type}</span>
            ${escapeHtml(linkLabel.title.length > 38 ? linkLabel.title.slice(0,38) + '…' : linkLabel.title)}
          </div>
        ` : ''}
        <div class="rock-progress-section">
          <div class="progress-bar"><div class="progress-bar-fill ${rock.status}" style="width: ${rock.progress}%"></div></div>
          <div class="rock-bottom">
            <div class="owner-tag">
              <div class="avatar col-${rock.ownerColor || 1}">${initialsOf(rock.owner)}</div>
              ${escapeHtml(rock.owner)}
            </div>
            <div class="milestones-count">${doneCount}/${rock.milestones.length} steps · ${rock.progress}%</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderAll() {
    renderQuarterTabs();
    renderSummary();
    renderOwnerFilter();
    renderRocks();
  }

  // === DRAWER ===
  function openRock(id) {
    const rock = data.rocks.find(r => r.id === id);
    if (!rock) return;
    currentEdit = id;
    renderDrawer(rock);
    document.getElementById('overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    currentEdit = null;
  }

  function getCurrentRock() {
    return data.rocks.find(r => r.id === currentEdit);
  }

  function renderDrawer(rock) {
    document.getElementById('drawerTag').textContent = `Rock · ${rock.quarter} ${rock.year}`;

    const visionOptions = buildVisionLinkOptions(rock.linkedTo);
    const linkPreview = getLinkLabel(rock.linkedTo);

    const body = document.getElementById('drawerBody');
    body.innerHTML = `
      <h2 class="drawer-title" contenteditable="true" data-field="title" data-placeholder="Rock title...">${escapeHtml(rock.title)}</h2>

      <div class="form-grid">
        <div class="form-field">
          <span class="field-label">Owner</span>
          <input class="field-input" data-field="owner" value="${escapeHtml(rock.owner)}" placeholder="Owner name">
        </div>
        <div class="form-field">
          <span class="field-label">Status</span>
          <select class="field-input" data-field="status">
            <option value="on-track" ${rock.status==='on-track'?'selected':''}>On track</option>
            <option value="at-risk" ${rock.status==='at-risk'?'selected':''}>At risk</option>
            <option value="off-track" ${rock.status==='off-track'?'selected':''}>Off track</option>
            <option value="done" ${rock.status==='done'?'selected':''}>Done</option>
          </select>
        </div>
        <div class="form-field">
          <span class="field-label">Quarter</span>
          <select class="field-input" data-field="quarter">
            <option ${rock.quarter==='Q1'?'selected':''}>Q1</option>
            <option ${rock.quarter==='Q2'?'selected':''}>Q2</option>
            <option ${rock.quarter==='Q3'?'selected':''}>Q3</option>
            <option ${rock.quarter==='Q4'?'selected':''}>Q4</option>
          </select>
        </div>
        <div class="form-field">
          <span class="field-label">Year</span>
          <input class="field-input" data-field="year" type="number" value="${rock.year}" min="2024" max="2035">
        </div>
        <div class="form-field">
          <span class="field-label">Progress (%)</span>
          <input class="field-input" data-field="progress" type="number" value="${rock.progress}" min="0" max="100">
        </div>
        <div class="form-field">
          <span class="field-label">Avatar Color</span>
          <select class="field-input" data-field="ownerColor">
            <option value="1" ${rock.ownerColor==1?'selected':''}>Blue</option>
            <option value="2" ${rock.ownerColor==2?'selected':''}>Red</option>
            <option value="3" ${rock.ownerColor==3?'selected':''}>Green</option>
            <option value="4" ${rock.ownerColor==4?'selected':''}>Gold</option>
            <option value="5" ${rock.ownerColor==5?'selected':''}>Purple</option>
          </select>
        </div>
        <div class="form-field full">
          <span class="field-label">Linked to Vision</span>
          <select class="field-input" data-field="linkedTo">
            <option value="">— No link —</option>
            ${visionOptions}
          </select>
          ${linkPreview ? `
            <div class="vision-link-preview">
              <span class="ribbon">${linkPreview.type}</span>
              <strong>${escapeHtml(linkPreview.title)}</strong> · ${escapeHtml(linkPreview.year || '')}
            </div>
          ` : ''}
        </div>
      </div>

      <div class="drawer-section">
        <div class="drawer-section-header">
          <div class="drawer-section-title">Description</div>
        </div>
        <div class="description-area" contenteditable="true" data-field="description" data-placeholder="Why does this rock matter? What's the definition of done?">${escapeHtml(rock.description)}</div>
      </div>

      <div class="drawer-section">
        <div class="drawer-section-header">
          <div class="drawer-section-title">Milestones / Steps</div>
          <button class="add-btn" onclick="addMilestone()">+ Add step</button>
        </div>
        <div class="milestone-list">
          ${rock.milestones.map((m, i) => `
            <div class="milestone-item ${m.done ? 'done' : ''}">
              <div class="check ${m.done ? 'done' : ''}" onclick="toggleMilestone(${i})">${m.done ? '✓' : ''}</div>
              <div class="milestone-text" contenteditable="true" data-ms-index="${i}" data-placeholder="Step description">${escapeHtml(m.text)}</div>
              <button class="delete-ms" onclick="removeMilestone(${i})">✕</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    // wire up text editing
    body.querySelectorAll('[contenteditable="true"]').forEach(el => {
      el.addEventListener('blur', handleEdit);
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !el.classList.contains('description-area')) {
          e.preventDefault();
          el.blur();
        }
      });
    });

    body.querySelectorAll('.field-input').forEach(el => {
      el.addEventListener('change', handleFieldChange);
      el.addEventListener('blur', handleFieldChange);
    });

    document.getElementById('drawerDelete').onclick = () => {
      if (!confirm('Delete this rock?')) return;
      deleteRock(currentEdit);
      closeDrawer();
    };
  }

  function buildVisionLinkOptions(currentLink) {
    if (!visionData) {
      return '<option disabled>No Vision data found — visit the Vision page first</option>';
    }
    const cur = currentLink ? `${currentLink.type}:${currentLink.id}` : '';
    let html = '<optgroup label="1-Year Goals">';
    (visionData.goals || []).forEach(g => {
      const val = `goal:${g.id}`;
      html += `<option value="${val}" ${val === cur ? 'selected' : ''}>${escapeHtml(g.title)}</option>`;
    });
    html += '</optgroup><optgroup label="3-5 Year Milestones">';
    (visionData.milestones || []).forEach(m => {
      const val = `milestone:${m.id}`;
      html += `<option value="${val}" ${val === cur ? 'selected' : ''}>${escapeHtml(m.title)}</option>`;
    });
    html += '</optgroup>';
    return html;
  }

  function handleEdit(e) {
    const el = e.target;
    const rock = getCurrentRock();
    if (!rock) return;

    const field = el.dataset.field;
    const msIdx = el.dataset.msIndex;

    if (field) {
      rock[field] = el.textContent.trim();
    } else if (msIdx !== undefined) {
      rock.milestones[parseInt(msIdx)].text = el.textContent.trim();
    }

    saveData();
    renderAll();
  }

  function handleFieldChange(e) {
    const el = e.target;
    const rock = getCurrentRock();
    if (!rock) return;
    const field = el.dataset.field;
    if (!field) return;

    let val = el.value;
    if (field === 'progress' || field === 'year' || field === 'ownerColor') {
      val = parseInt(val) || 0;
    }
    if (field === 'linkedTo') {
      if (!val) rock.linkedTo = null;
      else {
        const [type, id] = val.split(':');
        rock.linkedTo = { type, id };
      }
    } else {
      rock[field] = val;
    }

    saveData();
    renderAll();
    renderDrawer(rock); // refresh drawer to reflect any side effects (link preview, status colors)
  }

  function toggleMilestone(i) {
    const rock = getCurrentRock();
    if (!rock) return;
    rock.milestones[i].done = !rock.milestones[i].done;
    // auto-compute progress
    const done = rock.milestones.filter(m => m.done).length;
    if (rock.milestones.length > 0) {
      rock.progress = Math.round(done / rock.milestones.length * 100);
    }
    saveData();
    renderAll();
    renderDrawer(rock);
  }

  function addMilestone() {
    const rock = getCurrentRock();
    if (!rock) return;
    rock.milestones.push({ text: '', done: false });
    saveData();
    renderDrawer(rock);
  }

  function removeMilestone(i) {
    const rock = getCurrentRock();
    if (!rock) return;
    rock.milestones.splice(i, 1);
    saveData();
    renderDrawer(rock);
    renderAll();
  }

  function addRock() {
    const newId = 'r' + Date.now();
    const [q, y] = activeQuarter.split('-');
    const newRock = {
      id: newId,
      quarter: q,
      year: parseInt(y),
      title: 'New rock',
      owner: 'Sebastien G.',
      ownerColor: 2,
      status: 'on-track',
      progress: 0,
      description: '',
      linkedTo: null,
      milestones: [
        { text: 'First step', done: false }
      ]
    };
    data.rocks.push(newRock);
    saveData();
    renderAll();
    openRock(newId);
  }

  function deleteRock(id) {
    if (!confirm('Delete this rock?')) return;
    data.rocks = data.rocks.filter(r => r.id !== id);
    saveData();
    renderAll();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
  });

  // initial render
  renderAll();
</script>

</body>
</html>
